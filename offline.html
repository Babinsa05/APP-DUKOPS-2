<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUKOPS - Offline</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        .icon {
            font-size: 100px;
            margin-bottom: 30px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        
        h1 {
            font-size: 36px;
            margin-bottom: 15px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        p {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.9;
            line-height: 1.6;
        }
        
        .button {
            background: white;
            color: #667eea;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            margin-top: 20px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        
        .button:active {
            transform: translateY(0);
        }
        
        .features {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 30px;
        }
        
        .feature {
            text-align: center;
        }
        
        .feature i {
            font-size: 24px;
            margin-bottom: 10px;
            color: #ffd700;
        }
        
        .feature span {
            display: block;
            font-size: 14px;
            opacity: 0.8;
        }
        
        .footer {
            margin-top: 60px;
            font-size: 12px;
            opacity: 0.6;
        }
        
        .footer i {
            color: #ff6b6b;
        }
        
        @media (max-width: 480px) {
            h1 { font-size: 28px; }
            p { font-size: 16px; }
            .icon { font-size: 80px; }
            .button { padding: 12px 30px; font-size: 16px; }
        }
    </style>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="icon">
            <i class="fas fa-wifi"></i>
        </div>
        
        <h1>Koneksi Terputus</h1>
        
        <p>
            Maaf, Anda sedang offline. Silakan periksa koneksi internet Anda 
            untuk menggunakan DUKOPS PREMIUM.
        </p>
        
        <a href="index.html" class="button">
            <i class="fas fa-sync-alt" style="margin-right: 8px;"></i>
            Coba Lagi
        </a>
        
        <div class="features">
            <div class="feature">
                <i class="fas fa-camera"></i>
                <span>Ambil Foto</span>
            </div>
            <div class="feature">
                <i class="fas fa-calendar"></i>
                <span>Pilih Tanggal</span>
            </div>
            <div class="feature">
                <i class="fas fa-paper-plane"></i>
                <span>Kirim Laporan</span>
            </div>
        </div>
        
        <div class="footer">
            <i class="fas fa-heart"></i> KORAMIL 1609-05/SUKASADA 
            <i class="fas fa-heart"></i>
        </div>
    </div>
    
    <script>
        // Cek koneksi secara otomatis setiap 3 detik
        setInterval(() => {
            if (navigator.onLine) {
                window.location.href = 'index.html';
            }
        }, 3000);
        
        // Update status
        function updateOnlineStatus() {
            if (navigator.onLine) {
                window.location.href = 'index.html';
            }
        }
        
        window.addEventListener('online', updateOnlineStatus);
    </script>
</body>
</html>
